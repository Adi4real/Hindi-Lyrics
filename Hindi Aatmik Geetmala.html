<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Atmik Geetmala</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-page" class="page">
        <div class="search-container">

            <a href="index.html" style="text-decoration: none;">
            <button class="home-btn" style="margin-bottom: 20px; width: auto; padding: 10px 20px;">
                ⬅ मुख्य पोर्टल पर वापस जाएं
            </button>
            </a>

            <h1>Hindi Atmik Geetmala</h1>
            <input type="text" id="main-search" placeholder="गाने का नाम या नंबर खोजें..." onkeyup="filterSongs('main-search', 'song-list')">
            <ul id="song-list" class="list-container"></ul>
        </div>
    </div>

<div id="ppt-page" class="page hidden">
    <div class="sidebar">
        <input style="width: 250px;" type="text" id="side-search" placeholder="क्विक सर्च..." onkeyup="filterSongs('side-search', 'side-song-list')">
        
        <ul id="side-song-list" class="list-container mini"></ul>

        <div class="sidebar-label">वर्तमान गीत के भाग:</div>
        <div id="nav-labels" class="ppt-nav-labels"></div>

        <button onclick="goHome()" class="home-btn">मुख्य सूची</button>
    </div>
    
    <div class="ppt-viewer">
        <div id="slide-content" class="slide-text"></div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
